<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0d0b14}
body{font-family:Georgia,'DejaVu Serif','Times New Roman',serif;color:#efe3cc;-webkit-font-smoothing:antialiased}
canvas.gl{position:fixed;inset:0;display:block}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
.key{display:inline-block;border:1px solid rgba(239,227,204,.42);border-bottom-width:2px;border-radius:4px;padding:0 7px;margin:0 2px;font:600 11px/18px 'DejaVu Sans',system-ui,sans-serif;letter-spacing:.03em;color:#f4ecd9;background:rgba(255,255,255,.06);vertical-align:1px}
#intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(120% 90% at 50% 18%,#241c3a 0%,#151024 45%,#0a0812 100%);pointer-events:auto;transition:opacity 1.2s ease;text-align:center;padding:24px;z-index:5}
#intro.gone{opacity:0;pointer-events:none}
#intro h1{font-size:clamp(32px,6vw,58px);font-weight:400;letter-spacing:.42em;text-indent:.42em;color:#efe3cc;text-shadow:0 0 38px rgba(255,190,120,.28)}
#intro .sub{font-style:italic;color:#b7a98c;font-size:16px;letter-spacing:.08em}
#intro .glyphrow{opacity:.75;margin:4px 0}
#intro .controls{display:grid;grid-template-columns:auto auto;gap:7px 26px;margin-top:12px;font-size:13px;color:#9b8fae;align-items:center;text-align:left}
#intro .controls b{font-weight:400;color:#d8cbb0}
#intro .note{max-width:66ch;font-size:12px;line-height:1.7;color:#6f6880;margin-top:10px}
#enter{pointer-events:auto;cursor:pointer;margin-top:16px;background:none;border:1px solid #b7a98c;color:#e8d9b8;font:inherit;font-size:14px;letter-spacing:.32em;text-indent:.32em;padding:14px 36px;transition:.3s;animation:pulse 2.8s infinite}
#enter:hover{background:rgba(231,217,184,.12);box-shadow:0 0 28px rgba(255,200,130,.22)}
@keyframes pulse{50%{border-color:#7d7264}}
#crosshair{position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2px;border-radius:50%;background:rgba(244,236,217,.8);box-shadow:0 0 6px rgba(0,0,0,.7)}
#prompt{position:absolute;left:50%;bottom:11%;transform:translateX(-50%);background:rgba(18,14,26,.74);border:1px solid rgba(231,217,184,.22);border-radius:99px;padding:9px 20px;font-size:14px;letter-spacing:.04em;color:#efe3cc;opacity:0;transition:opacity .25s;white-space:nowrap;backdrop-filter:blur(4px)}
#prompt.on{opacity:1}
#region{position:absolute;top:9%;left:0;right:0;text-align:center;opacity:0;transition:opacity 1s;pointer-events:none}
#region .rname{font-size:25px;letter-spacing:.5em;text-indent:.5em;color:#efe3cc;text-shadow:0 2px 18px rgba(0,0,0,.85)}
#region .rsub{font-style:italic;font-size:14px;color:#c9b896;margin-top:6px;letter-spacing:.12em}
#region.on{opacity:1}
#toast{position:absolute;left:50%;bottom:19%;transform:translateX(-50%);font-style:italic;font-size:16px;color:#f4e8cf;text-shadow:0 2px 12px rgba(0,0,0,.9);opacity:0;transition:opacity .5s;text-align:center;max-width:70ch;pointer-events:none}
#toast.on{opacity:1}
#drink{position:absolute;left:26px;bottom:22px;background:rgba(18,14,26,.72);border:1px solid rgba(231,217,184,.25);border-radius:10px;padding:10px 16px;font-size:13px;color:#d8cbb0;display:none;backdrop-filter:blur(4px)}
#drink .dname{color:#efe3cc;font-size:15px}
#drink .dhint{font-size:11px;color:#9b8fae;margin-top:3px}
#mute{position:absolute;right:26px;top:22px;font-size:11px;letter-spacing:.24em;color:#8d8298;opacity:0;transition:.4s}
#mute.on{opacity:1}
#vign{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(140,52,14,.42) 100%);opacity:0;transition:opacity .45s;pointer-events:none}
#vign.on{opacity:1}
#dim{position:absolute;inset:0;background:rgba(6,4,10,.5);opacity:0;transition:.35s;backdrop-filter:blur(3px);pointer-events:none}
#dim.on{opacity:1;pointer-events:auto;cursor:pointer}
#card{position:absolute;left:50%;top:50%;transform:translate(-50%,-48%) scale(.97);width:min(660px,90vw);max-height:84vh;overflow:auto;background:linear-gradient(168deg,#f4e9d3,#e7d8bb);color:#241c12;border:1px solid #9c8158;box-shadow:0 30px 90px rgba(0,0,0,.65),inset 0 0 0 3px rgba(255,252,244,.5),inset 0 0 0 4px #b49a72;padding:34px 42px 24px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}
#card.on{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
#card a{color:#a1471f;text-decoration:underline;text-underline-offset:2px}
#card a:hover{color:#7c3413}
#card .photo{margin:12px 0 4px}
#card .photo img{display:block;width:62%;margin:0 auto;border:1px solid #9c8158;box-shadow:0 10px 28px rgba(40,25,10,.35);background:#fff;padding:5px}
#card .kicker{font-size:11px;letter-spacing:.34em;color:#a1471f;margin-bottom:9px}
#card h2{font-size:26px;font-weight:400;letter-spacing:.02em;margin-bottom:2px}
#card .titlesub{font-style:italic;color:#6b5c42;font-size:14px;margin-bottom:6px}
#card .meta{display:grid;grid-template-columns:auto 1fr;gap:3px 18px;font-size:13px;margin:12px 0 13px;border-top:1px solid #c3ad87;border-bottom:1px solid #c3ad87;padding:10px 0}
#card .meta dt{letter-spacing:.14em;font-size:10.5px;color:#8a7454;padding-top:2px}
#card .meta dd{color:#33291b}
#card .body{font-size:15px;line-height:1.66}
#card .body p+p{margin-top:9px}
#card .src{margin-top:13px;padding-top:9px;border-top:1px dashed #b49a72;font-style:italic;font-size:12px;color:#6b5c42}
#card .hint{margin-top:11px;text-align:center;font-size:11px;letter-spacing:.18em;color:#8a7454}
#err{position:absolute;top:0;left:0;right:0;background:#5c1010;color:#ffd9d9;font:12px/1.5 monospace;padding:10px 14px;display:none;white-space:pre-wrap;z-index:99;pointer-events:auto}
@media (max-width:700px){#intro h1{letter-spacing:.2em;text-indent:.2em}#card{padding:24px 22px 18px}}
</style>
</head>

,shape:"cylinder",name:"Chaco cylinder jar",drink:"Frothed cacao",kicker:"FROM THE HEARTH \u2014 THE POTTERY BAR",otitle:"Chocolate, Two Thousand Kilometres from Home",meta:[["VESSEL","Cylinder jar, white slip & black hatching \u2014 after Pueblo Bonito"],["CONTENTS","Frothed ceremonial cacao"],["VINTAGE","c. 1000\u20131125 CE"]],body:"Traces of theobromine \u2014 the fingerprint molecule of cacao \u2014 line cylinder jars from Pueblo Bonito, Chaco Canyon. The nearest cacao tree grew two thousand kilometres south: proof of trade routes carrying chocolate from Mesoamerica into the Ancestral Puebloan world, and of a bitter, frothed drink poured in the great houses a thousand years ago.",source:"Crown & Hurst, PNAS 106 (2009)",notes:["Bitter, frothy, a ghost of chile.","Worth walking two thousand kilometres for.","The froth is the point \u2014 pour from a height."]},{id:"qero",shape:"qero",name:"Inca qero",drink:"Chicha de jora (maize beer)",kicker:"FROM THE HEARTH \u2014 THE POTTERY BAR",otitle:"Drink With Both Hands",meta:[["VESSEL","Flared beaker (qero), banded geometry \u2014 Inca form"],["CONTENTS","Chicha de jora \u2014 sprouted-maize beer"],["VINTAGE","A living Andean tradition"]],body:"Chicha de jora is beer brewed from maize that has been sprouted, ground and fermented. Under the Inca, specialist brewers \u2014 among them the aqllakuna, the chosen women \u2014 made it in quantity, and qeros were kept in matched pairs: to toast is to drink together, never alone. Chicha is still brewed across the Andes; a red flag over a doorway means the batch is ready. Pour a splash for Pachamama first.",source:"Colonial chronicles (Guaman Poma); living tradition",notes:["Earthy, lightly sour, alive.","Qeros come in pairs \u2014 never toast alone.","A splash for Pachamama, always."]},{id:"pulque",shape:"cup",name:"Pulque cup",drink:"Pulque (octli) \u2014 fermented agave sap",kicker:"FROM THE HEARTH \u2014 THE POTTERY BAR",otitle:"The Drink of Four Hundred Rabbits",meta:[["VESSEL","Footed cup, black-on-orange \u2014 after Aztec polychrome"],["CONTENTS","Pulque \u2014 fermented aguamiel of the maguey"],["VINTAGE","Mesoamerican tradition, millennia deep"]],body:"Tap the heart of a maguey and its sweet sap ferments, milky and quick, into pulque \u2014 sacred to Mayahuel, goddess of the plant, and to the Centzon Totochtin, her four hundred rabbit children of drunkenness: the count, it was said, of all the ways a drinker can be drunk. Under Aztec law everyday drinking was restricted to elders and ritual; pulquer\xEDas still pour it across central Mexico.",source:"Aztec ethnohistory (Sahag\xFAn); living tradition",notes:["Milky, tangy, gently fizzy.","You are currently three rabbits deep.","Mayahuel sends her regards."]},{id:"wari",shape:"kero",name:"Wari kero",drink:"Chicha de molle (peppertree brew)",kicker:"FROM THE HEARTH \u2014 THE POTTERY BAR",otitle:"The Brewery on the Mesa",meta:[["VESSEL","Tall polychrome kero \u2014 after Cerro Ba\xFAl, Peru"],["CONTENTS","Chicha de molle \u2014 pink-peppertree berry brew"],["VINTAGE","c. 600\u20131000 CE"]],body:"On the mesa of Cerro Ba\xFAl the Wari empire ran a brewery whose brewers were high-status women \u2014 their fine shawl pins were found beside the vats. The house specialty: chicha brewed from the pink berries of the molle tree. When the outpost was abandoned around 1000 CE the brewery was ceremonially burned and the drinking vessels smashed into the embers. Last call, performed as ritual.",source:"Moseley et al., PNAS 102 (2005)",notes:["Pink-peppercorn bright, resinous, warm.","Brewed by the finest brewers of an empire.","Drink one for the brewery that burned."]}],ad=[{id:"maize",title:"Maize",sub:"the grass that fed a hemisphere",body:"Domesticated from teosinte \u2014 a wiry grass with a dozen hard seeds \u2014 in Mexico's Balsas valley around 9,000 years ago. The great unlock was nixtamalization: simmering kernels with lime or ash frees their niacin and makes masa possible. Blue, red, white, gold: the ears on this table are one species' argument that agriculture is an art form.",source:"Piperno et al., PNAS 106 (2009)"},{id:"squash",title:"Squash",sub:"the eldest sister",body:"Squash seeds from Guil\xE1 Naquitz cave in Oaxaca are about 10,000 years old \u2014 among the oldest domesticated plants anywhere in the Americas, older than maize itself. In the Three Sisters field its broad leaves shade the soil and hold the moisture; its flesh keeps through winter.",source:"Smith, Science 276 (1997)"},{id:"beans",title:"Beans",sub:"the generous sister",body:"Common beans were domesticated at least twice, independently, in Mesoamerica and the Andes. Planted with maize and squash they climb the stalks and fix nitrogen into the soil \u2014 feeding the field that feeds you. Together, the Three Sisters make a complete protein.",source:"Smithsonian National Museum of the American Indian"},{id:"amaranth",title:"Amaranth",sub:"the grain that was nearly lost",body:"Huauhtli fed the Aztec state \u2014 tribute lists demanded it by the granary. Mixed into tzoalli dough it was shaped into figures of the gods and eaten in ceremony, which is why its cultivation was restricted under colonial rule; the grain survived at the field margins. Popped, it still crackles like tiny fireworks.",source:"Sauer, The Grain Amaranths (1967)"},{id:"quinoa",title:"Quinoa",sub:"chisiya mama \u2014 the mother grain",body:"Domesticated in the Titicaca basin, quinoa packs a complete protein into a seed the size of a pinhead and thrives at altitudes where maize gives up. The Quechua name says the rest: chisiya mama, the mother grain.",source:"Pearsall (2008)"},{id:"cacao",title:"Cacao",sub:"currency you can drink",body:"The oldest traces of cacao come not from the Maya lowlands but from Mayo-Chinchipe sites in Amazonian Ecuador, 5,300 years ago. By Aztec times the beans were money \u2014 counterfeiters filled empty husks with clay. Ground, frothed and spiced, kakaw was a drink of rulers long before it was anyone's candy.",source:"Zarrillo et al., Nature Ecology & Evolution 2 (2018)"},{id:"manoomin",title:"Manoomin \u2014 wild rice",sub:"the food that grows on water",body:"For the Anishinaabe, manoomin is at the heart of the migration story: travel until you find the food that grows on water. Harvested by canoe \u2014 one person poling, one knocking ripe grain into the hull \u2014 it is a living, protected tradition, tended today as it has been for centuries.",source:"Anishinaabe tradition; Great Lakes Indian Fish & Wildlife Commission"},{id:"chile",title:"Chile",sub:"the first spice of the Americas",body:"Chile peppers were being gathered and grown in Mexico seven to nine thousand years ago; by 1492 dozens of cultivated forms ran from fruity to ferocious. They then conquered every cuisine on Earth within about a century \u2014 the fastest culinary conquest in history.",source:"Perry et al., Science 315 (2007)"}],nl={kicker:"FIRST MARKS",otitle:"An Open-Air Gallery of the World's Petroglyphs",meta:[["EXHIBITS","21 engraved stones \xB7 6 regional groves \xB7 1 field-notes grove"],["THE HEARTH","5 ancient drinks \xB7 8 founding foods"],["HOURS","Perpetual dusk. The sconces are always lit."]],body:`Every engraving here is a respectful hand redrawing of a real petroglyph, at or near its published scale, with its site, culture and sources on the lectern beside it. (A petroglyph is pecked or carved into rock; a painted image is a pictograph.) These are not tracings, and the boulders are not the real stones \u2014 the originals belong to their landscapes and to the living peoples whose heritage they are.

If you ever stand before the real thing: never touch, chalk, or make rubbings \u2014 skin oils and abrasion destroy in seconds what deserts preserved for millennia. Walk gently, and support the custodians who keep these places.
